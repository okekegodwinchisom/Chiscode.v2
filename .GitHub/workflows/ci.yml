name: ChisCode CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check backend/app --output-format=github

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:7.0
        ports: ["27017:27017"]
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand(\"ping\")'"
          --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:7.2-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5

    env:
      APP_ENV: development
      SECRET_KEY: test-secret-key-32-chars-minimum-here
      JWT_SECRET_KEY: test-jwt-secret-key-32-chars-minimum
      MONGODB_URL: mongodb://localhost:27017
      MONGODB_DB: chiscode_test
      REDIS_URL: redis://localhost:6379/1
      CODESTRAL_API_KEY: test-key
      LANGCHAIN_API_KEY: test-key
      PINECONE_API_KEY: test-key
      GITHUB_CLIENT_ID: test-id
      GITHUB_CLIENT_SECRET: test-secret
      REVENUECAT_API_KEY: test-key

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
        if: always()

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t chiscode-api:test ./backend