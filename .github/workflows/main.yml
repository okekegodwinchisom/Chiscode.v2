name: Build E2B Templates (CLI)

on:
  workflow_dispatch:

jobs:
  build-templates:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        template:
          - name: nextjs
          - name: sveltekit
          - name: react
          - name: vue
          - name: fastapi
          - name: django
          - name: express
          - name: static
    
    steps:
      - name: Install E2B CLI
        run: npm install -g @e2b/cli

      - name: Build ${{ matrix.template.name }} template
        env:
          E2B_ACCESS_TOKEN: ${{ secrets.E2B_ACCESS_TOKEN }}
        run: |
          e2b template build --name chiscode-${{ matrix.template.name }} \
            --dockerfile <(echo "
              FROM node:20-slim
              WORKDIR /home/user
              RUN npm install -g npm@latest
              RUN apt-get update && apt-get install -y curl git && rm -rf /var/lib/apt/lists/*
            ")

      - name: List all templates
        run: e2b template list
