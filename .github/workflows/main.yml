name: Build E2B Templates

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'templates/**'
      - '.github/workflows/build-templates.yml'

jobs:
  build-templates:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install E2B CLI
        run: |
          npm install -g @e2b/cli
          e2b --version

      - name: Authenticate with E2B
        env:
          E2B_ACCESS_TOKEN: ${{ secrets.E2B_ACCESS_TOKEN }}
        run: |
          # Create E2B config directory and file
          mkdir -p ~/.e2b
          cat > ~/.e2b/config.json << EOF
          {
            "accessToken": "$E2B_ACCESS_TOKEN"
          }
          EOF
          echo "E2B authentication configured"

      - name: Build all templates
        env:
          E2B_ACCESS_TOKEN: ${{ secrets.E2B_ACCESS_TOKEN }}
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
        run: |
          mkdir -p /tmp/e2b-templates
          touch /tmp/template_ids.env

          build_template() {
            NAME=$1
            DOCKERFILE=$2
            DIR="/tmp/e2b-templates/$NAME"
            mkdir -p "$DIR"
            printf '%s' "$DOCKERFILE" > "$DIR/e2b.Dockerfile"
            echo "=== Building $NAME ==="
            
            # Run build and capture output
            OUTPUT=$(e2b template build --name "$NAME" --path "$DIR" 2>&1)
            BUILD_EXIT_CODE=$?
            echo "$OUTPUT"
            
            if [ $BUILD_EXIT_CODE -ne 0 ]; then
              echo "❌ Failed to build $NAME"
              echo "Error details: $OUTPUT"
              return $BUILD_EXIT_CODE
            fi
            
            # Parse ID from output
            ID=$(echo "$OUTPUT" | grep -oP '(?<=sandbox template )\S+' | head -1)
            if [ -z "$ID" ]; then
              ID=$(echo "$OUTPUT" | grep -oP '[a-z0-9]{20,}' | head -1)
            fi
            if [ -z "$ID" ]; then
              ID=$(echo "$OUTPUT" | grep -oP 'chiscode-[a-z]+-\K[a-z0-9]+' | head -1)
            fi
            
            if [ -n "$ID" ]; then
              ENVKEY="E2B_TEMPLATE_$(echo $NAME | sed 's/chiscode-//' | tr 'a-z-' 'A-Z_')"
              echo "${ENVKEY}=${ID}" >> /tmp/template_ids.env
              echo "✅ ${ENVKEY}=${ID}"
            else
              echo "⚠️ Could not extract ID for $NAME"
              echo "${NAME}=unknown" >> /tmp/template_ids.env
            fi
          }

          # Node.js / JavaScript Templates
          build_template "chiscode-nextjs" \
            "FROM node:20-slim
            WORKDIR /home/user
            RUN npm install -g npm@latest
            RUN apt-get update && apt-get install -y curl git && rm -rf /var/lib/apt/lists/*"

          build_template "chiscode-sveltekit" \
            "FROM node:20-slim
            WORKDIR /home/user
            RUN npm install -g npm@latest
            RUN apt-get update && apt-get install -y curl git && rm -rf /var/lib/apt/lists/*"

          build_template "chiscode-react" \
            "FROM node:20-slim
            WORKDIR /home/user
            RUN npm install -g npm@latest
            RUN apt-get update && apt-get install -y curl git && rm -rf /var/lib/apt/lists/*"

          build_template "chiscode-vue" \
            "FROM node:20-slim
            WORKDIR /home/user
            RUN npm install -g npm@latest
            RUN apt-get update && apt-get install -y curl git && rm -rf /var/lib/apt/lists/*"

          build_template "chiscode-express" \
            "FROM node:20-slim
            WORKDIR /home/user
            RUN npm install -g npm@latest nodemon
            RUN apt-get update && apt-get install -y curl git && rm -rf /var/lib/apt/lists/*"

          # Python Templates
          build_template "chiscode-fastapi" \
            "FROM python:3.11-slim
            WORKDIR /home/user
            RUN pip install --no-cache-dir fastapi uvicorn[standard] httpx pydantic python-dotenv sqlalchemy alembic
            RUN apt-get update && apt-get install -y curl git && rm -rf /var/lib/apt/lists/*"

          build_template "chiscode-django" \
            "FROM python:3.11-slim
            WORKDIR /home/user
            RUN pip install --no-cache-dir django djangorestframework python-dotenv
            RUN apt-get update && apt-get install -y curl git && rm -rf /var/lib/apt/lists/*"

          build_template "chiscode-static" \
            "FROM python:3.11-slim
            WORKDIR /home/user
            RUN apt-get update && apt-get install -y curl git && rm -rf /var/lib/apt/lists/*"

          # Rust Template
          build_template "chiscode-rust" \
            "FROM rust:1.75-slim
            WORKDIR /home/user
            RUN apt-get update && apt-get install -y curl git && rm -rf /var/lib/apt/lists/*
            RUN cargo install cargo-watch"

          echo "=============================="
          echo "Build completed"
          echo "=============================="

      - name: Show template IDs
        if: always()
        run: |
          echo "=============================="
          echo "Template IDs generated:"
          echo "=============================="
          if [ -f /tmp/template_ids.env ]; then
            cat /tmp/template_ids.env
          else
            echo "No template IDs file found"
          fi

      - name: Upload template IDs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2b-template-ids
          path: /tmp/template_ids.env
