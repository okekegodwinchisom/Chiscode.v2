name: Build E2B Templates v2

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"

      - name: Install E2B CLI
        run: |
          pip install e2b --upgrade --user
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify E2B CLI
        run: |
          which e2b
          e2b --version

      - name: Create Dockerfiles
        run: |
          mkdir -p /tmp/e2b-templates/chiscode-nextjs
          mkdir -p /tmp/e2b-templates/chiscode-sveltekit
          mkdir -p /tmp/e2b-templates/chiscode-react
          mkdir -p /tmp/e2b-templates/chiscode-vue
          mkdir -p /tmp/e2b-templates/chiscode-fastapi
          mkdir -p /tmp/e2b-templates/chiscode-django
          mkdir -p /tmp/e2b-templates/chiscode-express
          mkdir -p /tmp/e2b-templates/chiscode-static
          mkdir -p /tmp/e2b-templates/chiscode-rust

          # ── Next.js ───────────────────────────────────────────
          cat > /tmp/e2b-templates/chiscode-nextjs/e2b.Dockerfile << 'EOF'
FROM node:20-slim
WORKDIR /home/user
RUN npm install -g npm@latest
RUN apt-get update && apt-get install -y curl git && rm -rf /var/lib/apt/lists/*
RUN mkdir -p /tmp/nextjs-cache && cd /tmp/nextjs-cache && \
    echo '{"dependencies":{"next":"^14.0.0","react":"^18.0.0","react-dom":"^18.0.0"},"devDependencies":{"typescript":"^5.0.0","@types/react":"^18.0.0","@types/react-dom":"^18.0.0","@types/node":"^20.0.0","tailwindcss":"^3.0.0","autoprefixer":"^10.0.0","postcss":"^8.0.0","eslint":"^8.0.0","eslint-config-next":"^14.0.0"}}' > package.json && \
    npm install && \
    cp -r node_modules /home/user/node_modules_cache && \
    cd / && rm -rf /tmp/nextjs-cache
EOF

          # ── SvelteKit ─────────────────────────────────────────
          cat > /tmp/e2b-templates/chiscode-sveltekit/e2b.Dockerfile << 'EOF'
FROM node:20-slim
WORKDIR /home/user
RUN npm install -g npm@latest
RUN apt-get update && apt-get install -y curl git && rm -rf /var/lib/apt/lists/*
RUN mkdir -p /tmp/sveltekit-cache && cd /tmp/sveltekit-cache && \
    echo '{"dependencies":{"@sveltejs/kit":"^1.0.0","svelte":"^4.0.0","vite":"^4.0.0","@sveltejs/adapter-auto":"^2.0.0","@sveltejs/adapter-static":"^2.0.0","@sveltejs/adapter-node":"^1.0.0"},"devDependencies":{"typescript":"^5.0.0","tslib":"^2.0.0","svelte-check":"^3.0.0","@typescript-eslint/eslint-plugin":"^6.0.0","@typescript-eslint/parser":"^6.0.0","eslint":"^8.0.0","eslint-plugin-svelte":"^2.0.0","prettier":"^3.0.0","prettier-plugin-svelte":"^3.0.0"}}' > package.json && \
    npm install && \
    cp -r node_modules /home/user/node_modules_cache && \
    cd / && rm -rf /tmp/sveltekit-cache
EOF

          # ── React / Vite ──────────────────────────────────────
          cat > /tmp/e2b-templates/chiscode-react/e2b.Dockerfile << 'EOF'
FROM node:20-slim
WORKDIR /home/user
RUN npm install -g npm@latest
RUN apt-get update && apt-get install -y curl git && rm -rf /var/lib/apt/lists/*
RUN mkdir -p /tmp/react-cache && cd /tmp/react-cache && \
    echo '{"dependencies":{"react":"^18.0.0","react-dom":"^18.0.0","react-router-dom":"^6.0.0"},"devDependencies":{"@vitejs/plugin-react":"^4.0.0","vite":"^5.0.0","typescript":"^5.0.0","@types/react":"^18.0.0","@types/react-dom":"^18.0.0","tailwindcss":"^3.0.0","autoprefixer":"^10.0.0","postcss":"^8.0.0","eslint":"^8.0.0","@typescript-eslint/eslint-plugin":"^6.0.0","@typescript-eslint/parser":"^6.0.0"}}' > package.json && \
    npm install && \
    cp -r node_modules /home/user/node_modules_cache && \
    cd / && rm -rf /tmp/react-cache
EOF

          # ── Vue / Nuxt ────────────────────────────────────────
          cat > /tmp/e2b-templates/chiscode-vue/e2b.Dockerfile << 'EOF'
FROM node:20-slim
WORKDIR /home/user
RUN npm install -g npm@latest
RUN apt-get update && apt-get install -y curl git && rm -rf /var/lib/apt/lists/*
RUN mkdir -p /tmp/vue-cache && cd /tmp/vue-cache && \
    echo '{"dependencies":{"vue":"^3.0.0","vue-router":"^4.0.0","pinia":"^2.0.0"},"devDependencies":{"@vitejs/plugin-vue":"^4.0.0","vite":"^5.0.0","typescript":"^5.0.0","vue-tsc":"^1.0.0","@types/node":"^20.0.0","tailwindcss":"^3.0.0","autoprefixer":"^10.0.0","postcss":"^8.0.0","eslint":"^8.0.0","eslint-plugin-vue":"^9.0.0"}}' > package.json && \
    npm install && \
    cp -r node_modules /home/user/node_modules_cache && \
    cd / && rm -rf /tmp/vue-cache
EOF

          # ── FastAPI ───────────────────────────────────────────
          cat > /tmp/e2b-templates/chiscode-fastapi/e2b.Dockerfile << 'EOF'
FROM python:3.11-slim
WORKDIR /home/user
RUN apt-get update && apt-get install -y curl git && rm -rf /var/lib/apt/lists/*
RUN pip install --no-cache-dir \
    fastapi \
    "uvicorn[standard]" \
    httpx \
    pydantic \
    pydantic-settings \
    python-dotenv \
    sqlalchemy \
    alembic \
    python-multipart \
    "python-jose[cryptography]" \
    passlib \
    bcrypt \
    aiofiles \
    email-validator \
    requests \
    python-dateutil \
    pytz \
    redis \
    celery \
    pytest \
    pytest-asyncio \
    httpx
EOF

          # ── Django ────────────────────────────────────────────
          cat > /tmp/e2b-templates/chiscode-django/e2b.Dockerfile << 'EOF'
FROM python:3.11-slim
WORKDIR /home/user
RUN apt-get update && apt-get install -y curl git && rm -rf /var/lib/apt/lists/*
RUN pip install --no-cache-dir \
    django \
    djangorestframework \
    django-cors-headers \
    django-environ \
    python-dotenv \
    pydantic \
    pydantic-settings \
    psycopg2-binary \
    whitenoise \
    gunicorn \
    pillow \
    requests \
    celery \
    redis \
    pytest \
    pytest-django
EOF

          # ── Express / Node ────────────────────────────────────
          cat > /tmp/e2b-templates/chiscode-express/e2b.Dockerfile << 'EOF'
FROM node:20-slim
WORKDIR /home/user
RUN npm install -g npm@latest nodemon
RUN apt-get update && apt-get install -y curl git && rm -rf /var/lib/apt/lists/*
RUN mkdir -p /tmp/express-cache && cd /tmp/express-cache && \
    echo '{"dependencies":{"express":"^4.18.0","cors":"^2.8.5","dotenv":"^16.0.0","helmet":"^7.0.0","morgan":"^1.10.0","mongoose":"^7.0.0","jsonwebtoken":"^9.0.0","bcryptjs":"^2.4.3","express-validator":"^7.0.0","multer":"^1.4.5","axios":"^1.0.0","uuid":"^9.0.0"},"devDependencies":{"nodemon":"^3.0.0","typescript":"^5.0.0","@types/express":"^4.17.0","@types/node":"^20.0.0","@types/cors":"^2.8.0","@types/jsonwebtoken":"^9.0.0","@types/bcryptjs":"^2.4.0","ts-node":"^10.9.0","jest":"^29.0.0","@types/jest":"^29.0.0"}}' > package.json && \
    npm install && \
    cp -r node_modules /home/user/node_modules_cache && \
    cd / && rm -rf /tmp/express-cache
EOF

          # ── Static HTML ───────────────────────────────────────
          cat > /tmp/e2b-templates/chiscode-static/e2b.Dockerfile << 'EOF'
FROM python:3.11-slim
WORKDIR /home/user
RUN apt-get update && apt-get install -y curl git && rm -rf /var/lib/apt/lists/*
EOF

          # ── Rust (Axum) ───────────────────────────────────────
          cat > /tmp/e2b-templates/chiscode-rust/e2b.Dockerfile << 'EOF'
FROM rust:1.75-slim
WORKDIR /home/user
RUN apt-get update && apt-get install -y curl git pkg-config libssl-dev && \
    rm -rf /var/lib/apt/lists/*
RUN mkdir -p /tmp/rust-cache/src && \
    cd /tmp/rust-cache && \
    printf '[package]\nname = "cache"\nversion = "0.1.0"\nedition = "2021"\n\n[dependencies]\naxum = "0.7"\ntokio = { version = "1", features = ["full"] }\nserde = { version = "1", features = ["derive"] }\nserde_json = "1"\ntower = "0.4"\ntower-http = { version = "0.5", features = ["cors", "fs"] }\ntracing = "0.1"\ntracing-subscriber = { version = "0.3", features = ["env-filter"] }\nanyhow = "1"\ndotenvy = "0.15"\nuuid = { version = "1", features = ["v4"] }\nchrono = { version = "0.4", features = ["serde"] }\n' > Cargo.toml && \
    echo 'fn main() {}' > src/main.rs && \
    cargo fetch && \
    cargo build --release 2>/dev/null || true && \
    mkdir -p /home/user/.cargo && \
    cp -r /usr/local/cargo/registry /home/user/cargo_registry_cache && \
    cd / && rm -rf /tmp/rust-cache
ENV CARGO_HOME=/home/user/.cargo
RUN mkdir -p /home/user/.cargo/registry && \
    cp -r /home/user/cargo_registry_cache/* /home/user/.cargo/registry/ 2>/dev/null || true
EOF

      - name: Build templates
        env:
          E2B_ACCESS_TOKEN: ${{ secrets.E2B_ACCESS_TOKEN }}
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
        run: |
          touch /tmp/template_ids.env

          for NAME in chiscode-nextjs chiscode-sveltekit chiscode-react chiscode-vue chiscode-fastapi chiscode-django chiscode-express chiscode-static chiscode-rust; do
            echo ""
            echo "=== Building $NAME ==="
            OUTPUT=$(e2b template build --name "$NAME" --path "/tmp/e2b-templates/$NAME" 2>&1)
            echo "$OUTPUT"

            ID=$(echo "$OUTPUT" | grep -oP '(?<=sandbox template )\S+(?= '"$NAME"')' | head -1)
            if [ -z "$ID" ]; then
              ID=$(echo "$OUTPUT" | grep -oP '[a-z0-9]{10,}' | head -1)
            fi

            ENVKEY="E2B_TEMPLATE_$(echo $NAME | sed 's/chiscode-//' | tr 'a-z-' 'A-Z_')"
            echo "${ENVKEY}=${ID}" >> /tmp/template_ids.env
            echo "-> ${ENVKEY}=${ID}"
          done

      - name: Show template IDs
        run: |
          echo ""
          echo "=============================="
          echo "Add these to HF Spaces secrets"
          echo "=============================="
          cat /tmp/template_ids.env

      - name: Upload template IDs
        uses: actions/upload-artifact@v4.6.2
        with:
          name: e2b-template-ids-v2
          path: /tmp/template_ids.env
          
