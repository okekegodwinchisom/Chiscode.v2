name: Build E2B Templates (v2)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup project and install E2B SDK
        run: |
          mkdir -p /tmp/e2b-builder
          cd /tmp/e2b-builder
          npm init -y
          npm install e2b@latest

      - name: Build all templates with v2 API
        env:
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
        run: |
          cd /tmp/e2b-builder
          mkdir -p /tmp/template_ids
          
          # Helper function to build a template using the v2 API
          build_template_v2() {
            local NAME=$1
            local DOCKERFILE_CONTENT=$2
            
            echo ""
            echo "=== Building $NAME with v2 API ==="
            
            # Create a temporary build script for this template
            cat > "build-${NAME}.mjs" << EOF
import { Template } from 'e2b';
import { writeFileSync } from 'fs';

const dockerfileContent = \`${DOCKERFILE_CONTENT}\`;

// Define the template using the v2 API
const template = Template()
  .fromDockerfile(dockerfileContent);

try {
  // Build the template
  const result = await Template.build(template, {
    alias: '${NAME}',
  });
  
  const templateId = result.templateID;
  console.log(\`Template built successfully: \${templateId}\`);
  
  // Save the template ID to a file
  const envKey = 'E2B_TEMPLATE_$(echo ${NAME} | sed 's/chiscode-//' | tr 'a-z-' 'A-Z_')';
  writeFileSync('/tmp/template_ids/${NAME}.env', \`\${envKey}=\${templateId}\n\`);
  console.log(\`-> \${envKey}=\${templateId}\`);
} catch (error) {
  console.error('Build failed:', error.message);
  process.exit(1);
}
EOF
            
            # Execute the build script
            E2B_API_KEY="${E2B_API_KEY}" node "build-${NAME}.mjs"
          }
          
          # ──────────────────────────────────────────────────────────
          # Next.js Template
          # ──────────────────────────────────────────────────────────
          build_template_v2 "chiscode-nextjs" \
"FROM node:20-slim
WORKDIR /home/user
RUN npm install -g npm@latest
RUN apt-get update && apt-get install -y curl git && rm -rf /var/lib/apt/lists/*
RUN mkdir -p /tmp/nextjs-cache && cd /tmp/nextjs-cache && \
    echo '{\"dependencies\":{\"next\":\"^14.0.0\",\"react\":\"^18.0.0\",\"react-dom\":\"^18.0.0\"},\"devDependencies\":{\"typescript\":\"^5.0.0\",\"@types/react\":\"^18.0.0\",\"@types/react-dom\":\"^18.0.0\",\"@types/node\":\"^20.0.0\",\"tailwindcss\":\"^3.0.0\",\"autoprefixer\":\"^10.0.0\",\"postcss\":\"^8.0.0\",\"eslint\":\"^8.0.0\",\"eslint-config-next\":\"^14.0.0\"}}' > package.json && \
    npm install && \
    cp -r node_modules /home/user/node_modules_cache && \
    cd / && rm -rf /tmp/nextjs-cache"
          
          # ──────────────────────────────────────────────────────────
          # SvelteKit Template
          # ──────────────────────────────────────────────────────────
          build_template_v2 "chiscode-sveltekit" \
"FROM node:20-slim
WORKDIR /home/user
RUN npm install -g npm@latest
RUN apt-get update && apt-get install -y curl git && rm -rf /var/lib/apt/lists/*
RUN mkdir -p /tmp/sveltekit-cache && cd /tmp/sveltekit-cache && \
    echo '{\"dependencies\":{\"@sveltejs/kit\":\"^1.0.0\",\"svelte\":\"^4.0.0\",\"vite\":\"^4.0.0\",\"@sveltejs/adapter-auto\":\"^2.0.0\",\"@sveltejs/adapter-static\":\"^2.0.0\",\"@sveltejs/adapter-node\":\"^1.0.0\"},\"devDependencies\":{\"typescript\":\"^5.0.0\",\"tslib\":\"^2.0.0\",\"svelte-check\":\"^3.0.0\",\"@typescript-eslint/eslint-plugin\":\"^6.0.0\",\"@typescript-eslint/parser\":\"^6.0.0\",\"eslint\":\"^8.0.0\",\"eslint-plugin-svelte\":\"^2.0.0\",\"prettier\":\"^3.0.0\",\"prettier-plugin-svelte\":\"^3.0.0\"}}' > package.json && \
    npm install && \
    cp -r node_modules /home/user/node_modules_cache && \
    cd / && rm -rf /tmp/sveltekit-cache"
          
          # ──────────────────────────────────────────────────────────
          # React / Vite Template
          # ──────────────────────────────────────────────────────────
          build_template_v2 "chiscode-react" \
"FROM node:20-slim
WORKDIR /home/user
RUN npm install -g npm@latest
RUN apt-get update && apt-get install -y curl git && rm -rf /var/lib/apt/lists/*
RUN mkdir -p /tmp/react-cache && cd /tmp/react-cache && \
    echo '{\"dependencies\":{\"react\":\"^18.0.0\",\"react-dom\":\"^18.0.0\",\"react-router-dom\":\"^6.0.0\"},\"devDependencies\":{\"@vitejs/plugin-react\":\"^4.0.0\",\"vite\":\"^5.0.0\",\"typescript\":\"^5.0.0\",\"@types/react\":\"^18.0.0\",\"@types/react-dom\":\"^18.0.0\",\"tailwindcss\":\"^3.0.0\",\"autoprefixer\":\"^10.0.0\",\"postcss\":\"^8.0.0\",\"eslint\":\"^8.0.0\",\"@typescript-eslint/eslint-plugin\":\"^6.0.0\",\"@typescript-eslint/parser\":\"^6.0.0\"}}' > package.json && \
    npm install && \
    cp -r node_modules /home/user/node_modules_cache && \
    cd / && rm -rf /tmp/react-cache"
          
          # ──────────────────────────────────────────────────────────
          # Vue / Nuxt Template
          # ──────────────────────────────────────────────────────────
          build_template_v2 "chiscode-vue" \
"FROM node:20-slim
WORKDIR /home/user
RUN npm install -g npm@latest
RUN apt-get update && apt-get install -y curl git && rm -rf /var/lib/apt/lists/*
RUN mkdir -p /tmp/vue-cache && cd /tmp/vue-cache && \
    echo '{\"dependencies\":{\"vue\":\"^3.0.0\",\"vue-router\":\"^4.0.0\",\"pinia\":\"^2.0.0\"},\"devDependencies\":{\"@vitejs/plugin-vue\":\"^4.0.0\",\"vite\":\"^5.0.0\",\"typescript\":\"^5.0.0\",\"vue-tsc\":\"^1.0.0\",\"@types/node\":\"^20.0.0\",\"tailwindcss\":\"^3.0.0\",\"autoprefixer\":\"^10.0.0\",\"postcss\":\"^8.0.0\",\"eslint\":\"^8.0.0\",\"eslint-plugin-vue\":\"^9.0.0\"}}' > package.json && \
    npm install && \
    cp -r node_modules /home/user/node_modules_cache && \
    cd / && rm -rf /tmp/vue-cache"
          
          # ──────────────────────────────────────────────────────────
          # FastAPI Template
          # ──────────────────────────────────────────────────────────
          build_template_v2 "chiscode-fastapi" \
"FROM python:3.11-slim
WORKDIR /home/user
RUN apt-get update && apt-get install -y curl git && rm -rf /var/lib/apt/lists/*
RUN pip install --no-cache-dir \
    fastapi \
    \"uvicorn[standard]\" \
    httpx \
    pydantic \
    pydantic-settings \
    python-dotenv \
    sqlalchemy \
    alembic \
    python-multipart \
    python-jose \
    passlib \
    bcrypt \
    aiofiles \
    email-validator"
          
          # ──────────────────────────────────────────────────────────
          # Django Template
          # ──────────────────────────────────────────────────────────
          build_template_v2 "chiscode-django" \
"FROM python:3.11-slim
WORKDIR /home/user
RUN apt-get update && apt-get install -y curl git && rm -rf /var/lib/apt/lists/*
RUN pip install --no-cache-dir \
    django \
    djangorestframework \
    django-cors-headers \
    django-environ \
    python-dotenv \
    psycopg2-binary \
    whitenoise \
    gunicorn \
    pillow"
          
          # ──────────────────────────────────────────────────────────
          # Express / Node Template
          # ──────────────────────────────────────────────────────────
          build_template_v2 "chiscode-express" \
"FROM node:20-slim
WORKDIR /home/user
RUN npm install -g npm@latest nodemon
RUN apt-get update && apt-get install -y curl git && rm -rf /var/lib/apt/lists/*
RUN mkdir -p /tmp/express-cache && cd /tmp/express-cache && \
    echo '{\"dependencies\":{\"express\":\"^4.18.0\",\"cors\":\"^2.8.5\",\"dotenv\":\"^16.0.0\",\"helmet\":\"^7.0.0\",\"morgan\":\"^1.10.0\",\"mongoose\":\"^7.0.0\",\"jsonwebtoken\":\"^9.0.0\",\"bcryptjs\":\"^2.4.3\",\"express-validator\":\"^7.0.0\",\"multer\":\"^1.4.5\"},\"devDependencies\":{\"nodemon\":\"^3.0.0\",\"typescript\":\"^5.0.0\",\"@types/express\":\"^4.17.0\",\"@types/node\":\"^20.0.0\",\"@types/cors\":\"^2.8.0\",\"@types/jsonwebtoken\":\"^9.0.0\",\"@types/bcryptjs\":\"^2.4.0\",\"ts-node\":\"^10.9.0\"}}' > package.json && \
    npm install && \
    cp -r node_modules /home/user/node_modules_cache && \
    cd / && rm -rf /tmp/express-cache"
          
          # ──────────────────────────────────────────────────────────
          # Static HTML Template
          # ──────────────────────────────────────────────────────────
          build_template_v2 "chiscode-static" \
"FROM python:3.11-slim
WORKDIR /home/user
RUN apt-get update && apt-get install -y curl git && rm -rf /var/lib/apt/lists/*"

      - name: Collect and display all template IDs
        run: |
          echo ""
          echo "=============================="
          echo "All Template IDs (v2):"
          echo "=============================="
          cat /tmp/template_ids/*.env > /tmp/all_template_ids.env 2>/dev/null || echo "No templates built yet"
          cat /tmp/all_template_ids.env 2>/dev/null || echo "No template IDs found"
          echo ""
          echo "Add these to your HF Spaces secrets"

      - name: Upload template IDs as artifact
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: e2b-template-ids-v2
          path: /tmp/all_template_ids.env
