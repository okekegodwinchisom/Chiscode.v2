<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#07090f" />
  <title>{% block title %}ChisCode{% endblock %}</title>
  <meta name="description" content="{% block description %}AI-powered agent builder — natural language to production-ready apps{% endblock %}" />

  <!-- Preconnect to font CDN -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Design system -->
  <link rel="stylesheet" href="/static/css/main.css" />

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js" defer></script>
  <!-- Alpine.js -->
  <script src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js" defer></script>

  <script>
// Add this right after your existing script tags
(function() {
    // Check if we're in an iframe
    if (window.self !== window.top) {
        console.log('🔍 Detected in iframe - redirecting to direct URL');
        
        // Get the direct Space URL
        const directUrl = 'https://godwin021-chiscode-v2.hf.space' + window.location.pathname + window.location.search;
        
        // Show a message and redirect
        const messageDiv = document.createElement('div');
        messageDiv.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #00e5ff;
            color: black;
            padding: 1rem;
            text-align: center;
            z-index: 9999;
            font-family: sans-serif;
        `;
        messageDiv.innerHTML = `
            ⚡ For the best experience, 
            <a href="${directUrl}" style="color: black; font-weight: bold; text-decoration: underline;">
                click here to open the app in full screen
            </a>
        `;
        document.body.appendChild(messageDiv);
    }
})();
  </script>
  
  {% block head %}{% endblock %}
</head>
<body
  class="bg-void text-ghost antialiased min-h-screen"
  x-data="{ sidebarOpen: false }"
>


  <!-- Ambient texture overlays -->
  <div class="noise"     aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>

  {% block body %}{% endblock %}

  <!-- Toast container -->
  <div id="toast-container" aria-live="polite" aria-atomic="false"></div>

  <!-- Main JS -->
  <script src="/static/js/main.js"></script>
  {% block scripts %}{% endblock %}
<script>        
</body>
</html>
